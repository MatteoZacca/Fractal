syntax = "proto3";

package dfs;
option go_package = "./pb";

// ==========================================
// COMMON MESSAGES (Used by multiple services)
// ==========================================

// A generic response for operations that just need to say "Success" or "Error"
message StandardResponse {
    bool success = 1;
    string error_message = 2;
}

// Represents a list of Worker Node IP addresses
message NodeList {
    repeated string worker_ips = 1;
}

// The raw bytes for streaming 64MB files
message ChunkData {
    string chunk_id = 1;
    bytes data = 2;
}

// ==========================================
// MASTER NODE MESSAGES
// ==========================================

// Client -> NameNode
message CreateFileRequest {
    string file_path = 1;
    int64 file_size = 2;
}

// NameNode -> Client
message CreateFileResponse {
    // Maps a ChunkID (e.g., "chunk-123") to a list of Worker IPs (e.g., ["192.168.1.5:8001", "192.168.1.6:8002"])
    map<string, NodeList> chunk_locations = 1;
}

// Client -> NameNode
message CommitFileRequest {
    string file_path = 1;
    repeated string chunk_ids = 2;
    map<string, NodeList> chunk_locations = 3;
}

// Client -> NameNode
message GetFileRequest {
    string file_path = 1;
}

// NameNode -> Client
message GetFileResponse {
    map<string, NodeList> chunk_locations = 1;
}

// DataNode -> NameNode
message HeartbeatMsg {
    string node_id = 1;
    string address = 2;
    int64 disk_usage = 3;
    int64 disk_capacity = 4;
    repeated string stored_chunk_ids = 5; // The Master uses this to verify the Worker hasn't lost data
    string rack_id = 6;
}

// ===================================================
// CLIENT asks NAMENODE for listing files in namespace
// ===================================================

// Client -> NameNode
message ListFilesRequest {}

message FileInfo {
    string file_name = 1;
    int32 chunk_count = 2;
}

// NameNode -> Client
message ListFilesResponse {
    repeated FileInfo files = 1;
}


// ==========================================
// WORKER NODE MESSAGES
// ==========================================

// CLient -> DataNode
message RetrieveChunkRequest {
    string chunk_id = 1;
}

// ==========================================
// SERVICES (The RPC Verbs)
// ==========================================

// The API exposed by the Master Node
service MasterService {
    rpc CreateFile(CreateFileRequest) returns (CreateFileResponse);
    rpc CommitFile(CommitFileRequest) returns (StandardResponse); // Call this AFTER Client uploads chunks
    rpc GetFileLocations(GetFileRequest) returns (GetFileResponse);
    rpc SendHeartbeat(HeartbeatMsg) returns (StandardResponse);
    rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
}

// The API exposed by the Worker Node
service WorkerService {
    // Client streams chunks TO the Worker
    rpc StoreChunk(stream ChunkData) returns (StandardResponse);

    // Client streams chunks FROM the Worker
    rpc RetrieveChunk(RetrieveChunkRequest) returns (stream ChunkData);
}